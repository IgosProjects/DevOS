# Compiler and linker used to build the kernel
KERNELCC = i686-elf-gcc
KERNELLD = i686-elf-ld 
KERNELAS = nasm

# Flags
CFLAGS = -m32 -ffreestanding -I src/include -g
LDFLAGS = -nostdlib -m elf_i386 -T linker.ld
ASFLAGS = -f elf32 -g -F dwarf

# Targets

ELF = kernel.elf
ISO = DevOS.iso
CPIO = init.cpio
TARGETARCH = x86
